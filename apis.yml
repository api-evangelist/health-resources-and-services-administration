apis:
  - aid: health-resources-and-services-administration:hrsa-health-center-data-service
    name: HRSA Health Center Data Service
    description: >-
      The HRSA Health Center Data Service enables users to query for health
      centers by state, county, or ZIP Code, providing access to federally
      qualified health center location and service information.
    humanURL: https://data.hrsa.gov/tools/web-services
    baseURL: https://data.hrsa.gov
    tags:
      - Government
      - Healthcare
      - Health Centers
      - Open Data
    properties:
